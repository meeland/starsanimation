<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анимация движения звезд</title>
    <style>
        /* Стили страницы */
        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнеры для звезд */
        #stars, #stars2, #stars3 {
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Разная скорость и размер для слоев */
        #stars {
            width: 1px;
            height: 1px;
            animation: animStar 240s linear infinite;
        }
        #stars2 {
            width: 2px;
            height: 2px;
            animation: animStar 180s linear infinite;
        }
        #stars3 {
            width: 3px;
            height: 3px;
            animation: animStar 120s linear infinite;
        }

        /* Создаем "дубликат" слоя снизу для бесшовного зацикливания */
        #stars::after, #stars2::after, #stars3::after {
            content: " ";
            position: absolute;
            left: -2000px;
            width: inherit;
            height: inherit;
            background: inherit;
            box-shadow: inherit;
        }

        /* Движение */
        @keyframes animStar {   
            from { transform: translateX(0px); }
            to   { transform: translateX(2000px); }
        }


    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <script>
        /**
         * Функция генерации теней (звезд)
         * @param {string} selector - ID элемента
         * @param {number} count - количество звезд
         */
        function createStars(selector, count) {
            const element = document.querySelector(selector);
            let shadows = [];

            for (let i = 0; i < count; i++) {
                // Генерируем случайные координаты в пределах 2000px
                const x = Math.floor(Math.random() * 2000);
                const y = Math.floor(Math.random() * 2000);
                shadows.push(`${x}px ${y}px #FFF`);
            }

            // Применяем сгенерированные тени к элементу
            element.style.boxShadow = shadows.join(", ");
        }

        // Запускаем генерацию при загрузке
        // (слой, количество звезд)
        createStars("#stars", 700);
        createStars("#stars2", 200);
        createStars("#stars3", 100);
    </script>
</body>
</html>
